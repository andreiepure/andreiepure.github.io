---
layout: default
---
<div class="blog-archive">
  <h1>{{ page.title }}</h1>
  {%- if content != "" -%}
  <div class="blog-intro">{{ content }}</div>
  {%- endif -%}
  <ul class="post-list">
    {%- for post in site.posts -%}
    <li>
      <span class="post-date">{{ post.date | date: "%Y-%m-%d" }}</span>
      <a class="post-link" href="{{ post.url | relative_url }}">{{ post.title | escape }}</a>
    </li>
    {%- endfor -%}
  </ul>
</div>
